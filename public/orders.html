<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a9d2b">
<link rel="manifest" href="/manifest.json">
<title>My Orders · PANELSELL</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="top"></div>
<main class="wrap"><div class="card"><h2>📋 My Orders</h2><div id="list"><div class="spinner"></div></div></div></main>
<div class="footer" data-footer></div>
<div id="nav"></div>
<script src="/js/app.js"></script>
<script>
async function boot() {
  document.getElementById("top").innerHTML = topBar();
  document.getElementById("nav").innerHTML = navBar("orders.html");
  await FF.loadConfig(); await FF.loadUser();
  if (!FF.requireAuth()) return;
  try {
    const d = await FF.api("/orders");
    const el = document.getElementById("list");
    if (!d.orders.length) { el.innerHTML = '<div class="empty"><h3>No order found !</h3><a class="btn btn-red" style="display:inline-flex;width:auto;padding:11px 26px" href="index.html">ORDER NOW</a></div>'; return; }
    el.innerHTML = d.orders.map(o => `
      <div style="padding:14px 0;border-bottom:1px solid var(--line)">
        <div class="row"><b>Serial NO: ${o.serial}</b><span class="badge b-${o.status}">${o.status}</span></div>
        <div class="muted" style="margin-top:4px">${FF.esc(o.product_name)} · ${FF.esc(o.package_name)} ×${o.qty}</div>
        <div class="row" style="margin-top:4px"><span class="muted">${new Date(o.created_at).toLocaleString()}</span><b style="color:var(--green)">${FF.money(o.amount)}</b></div>
      </div>`).join("");
  } catch { document.getElementById("list").innerHTML = '<div class="empty"><h3>Failed to load</h3></div>'; }
}
boot();
</script>
</body>
</html>
