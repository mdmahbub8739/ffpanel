<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a9d2b">
<link rel="manifest" href="/manifest.json">
<title>My Key · PANELSELL</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="top"></div>
<main class="wrap"><div class="card"><h2>🗝️ My Key</h2><div id="list"><div class="spinner"></div></div></div></main>
<div class="footer" data-footer></div>
<div id="nav"></div>
<script src="/js/app.js"></script>
<script>
async function boot() {
  document.getElementById("top").innerHTML = topBar();
  document.getElementById("nav").innerHTML = navBar("keys.html");
  await FF.loadConfig(); await FF.loadUser();
  if (!FF.requireAuth()) return;
  if (FF.param("pay") === "success") FF.toast("Payment verified ✓");
  try {
    const d = await FF.api("/keys");
    const el = document.getElementById("list");
    if (!d.keys.length) { el.innerHTML = '<div class="empty"><h3>No keys yet</h3><a class="btn btn-red" style="display:inline-flex;width:auto;padding:11px 26px" href="index.html">ORDER NOW</a></div>'; return; }
    el.innerHTML = d.keys.map(k => `
      <div style="padding:16px 0;border-bottom:1px solid var(--line)">
        <div class="row"><b>Serial NO: ${k.serial}</b><span class="badge b-${k.status}">${k.status}</span></div>
        <div class="muted" style="margin-top:4px">Date: ${new Date(k.created_at).toLocaleString()}</div>
        <div class="muted">Package: ${FF.esc(k.product_name)} — ${FF.esc(k.package_name)}</div>
        <div class="muted">Price: ${FF.money(k.amount)}</div>
        ${k.delivered_code ? `
          <div style="margin-top:10px"><b>Your Code:</b>
          <div class="copybox" style="margin-top:6px"><input class="input" value="${FF.esc(k.delivered_code)}" readonly style="background:#10141f;color:#fff"><button class="btn btn-dark" style="width:auto;padding:0 14px" onclick="navigator.clipboard.writeText('${FF.esc(k.delivered_code).replace(/'/g, "\\'")}');FF.toast('Code copied')">⧉ Copy</button></div></div>
        ` : (k.status === "pending" ? '<button class="btn btn-green" style="margin-top:10px;width:auto;padding:9px 22px" onclick="location.href=\'index.html\'">Pay Now</button>' : "")}
      </div>`).join("");
  } catch { document.getElementById("list").innerHTML = '<div class="empty"><h3>Failed to load</h3></div>'; }
}
boot();
</script>
</body>
</html>
