<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a9d2b">
<link rel="manifest" href="/manifest.json">
<title>PANELSELL</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="top"></div>
<main class="wrap" id="page"><div class="spinner"></div></main>
<div class="footer" data-footer></div>
<div id="nav"></div>
<script src="/js/app.js"></script>
<script>
let PROD = null, PKGS = [], SEL = null, QTY = 1, METHOD = "online";
async function boot() {
  document.getElementById("top").innerHTML = topBar();
  document.getElementById("nav").innerHTML = navBar("index.html");
  await FF.loadConfig(); await FF.loadUser();
  const slug = FF.param("slug");
  if (!slug) { location.href = "index.html"; return; }
  try {
    const d = await FF.api("/products/" + encodeURIComponent(slug));
    PROD = d.product; PKGS = d.packages; SEL = PKGS[0] || null;
    render();
  } catch { document.getElementById("page").innerHTML = '<div class="empty"><h3>Product not found</h3></div>'; }
}
function total() { return SEL ? SEL.price * QTY : 0; }
function render() {
  const bal = FF.user ? FF.user.balance : 0;
  document.getElementById("page").innerHTML = `
  <div class="card">
    <div class="row">
      <img src="${FF.esc(PROD.image_url || "")}" style="width:64px;height:64px;border-radius:12px;object-fit:cover;background:#0b0f17">
      <div style="flex:1"><h2 style="margin:0">${FF.esc(PROD.name)}</h2><span class="badge b-completed">${FF.esc(PROD.type)}</span></div>
    </div>
    ${PROD.description ? `<p class="muted" style="margin-top:10px">${FF.esc(PROD.description)}</p>` : ""}
    ${PROD.demo_url ? `<a class="btn btn-red btn-sm" style="margin-top:10px" href="${FF.esc(PROD.demo_url)}" target="_blank" rel="noopener">▶ WATCH DEMO</a>` : ""}
  </div>

  <div class="card">
    <h2>① Select Recharge</h2>
    <div class="pkg" id="pkgs">${PKGS.map((p, i) => `
      <div class="pkg-item ${i === 0 ? "sel" : ""}" data-i="${i}">
        <span>${FF.esc(p.name)}</span><span class="p">${FF.money(p.price)}</span>
      </div>`).join("") || '<p class="muted">No packages available</p>'}</div>
  </div>

  <div class="card">
    <h2>② Payment Method</h2>
    <div class="pay-methods">
      <div class="pay-opt ${METHOD === "online" ? "sel" : ""}" data-m="online">💳 Auto Payment (bKash / Nagad)</div>
      <div class="pay-opt ${METHOD === "wallet" ? "sel" : ""}" data-m="wallet">👛 Wallet Pay (Balance: ${FF.money(bal)})</div>
    </div>
  </div>

  <div class="card">
    <div class="row"><span>Quantity</span>
      <div class="qty"><button id="dec">−</button><span id="q">${QTY}</span><button id="inc">+</button></div>
    </div>
    <div class="divider"></div>
    <div class="field"><label>Promo Code</label>
      <div class="copybox"><input class="input" id="promo" placeholder="Enter Promo Code"><button class="btn btn-green" style="width:auto;padding:0 18px" id="apply">Apply</button></div>
    </div>
    <div class="row" style="margin-top:10px"><span class="muted">আপনার অ্যাকাউন্ট ব্যালেন্স</span><b>${FF.money(bal)}</b></div>
    <div class="row" style="margin-top:6px"><span class="muted">প্রোডাক্ট কিনতে প্রয়োজন</span><b style="color:var(--green)" id="tot">${FF.money(total())}</b></div>
    <button class="btn btn-green btn-block" style="margin-top:14px" id="buy">${FF.user ? "PURCHASE NOW" : "LOG IN TO BUY"}</button>
  </div>

  ${PROD.rules ? `<div class="card"><h2>Rules & Conditions</h2><p class="muted" style="white-space:pre-line">${FF.esc(PROD.rules)}</p></div>` : ""}`;

  bind();
}
function bind() {
  document.querySelectorAll("#pkgs .pkg-item").forEach(el => el.onclick = () => {
    document.querySelectorAll("#pkgs .pkg-item").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel"); SEL = PKGS[+el.dataset.i]; upd();
  });
  document.querySelectorAll(".pay-opt").forEach(el => el.onclick = () => {
    document.querySelectorAll(".pay-opt").forEach(x => x.classList.remove("sel"));
    el.classList.add("sel"); METHOD = el.dataset.m;
  });
  document.getElementById("inc").onclick = () => { QTY = Math.min(50, QTY + 1); upd(); };
  document.getElementById("dec").onclick = () => { QTY = Math.max(1, QTY - 1); upd(); };
  document.getElementById("buy").onclick = buy;
}
function upd() {
  document.getElementById("q").textContent = QTY;
  document.getElementById("tot").textContent = FF.money(total());
}
async function buy() {
  if (!FF.user) { location.href = "login.html?next=" + encodeURIComponent(location.pathname + location.search); return; }
  if (!SEL) return FF.toast("Select a package", true);
  const btn = document.getElementById("buy"); btn.disabled = true; btn.textContent = "Processing...";
  try {
    const r = await FF.api("/orders", { method: "POST", body: { package_id: SEL.id, qty: QTY, payment_method: METHOD, promo: document.getElementById("promo").value } });
    if (r.mode === "online" && r.checkout_url) { location.href = r.checkout_url; return; }
    if (r.mode === "wallet") {
      FF.toast(r.status === "completed" ? "Purchased! Check My Key" : "Order placed, processing");
      setTimeout(() => location.href = "keys.html", 900);
    }
  } catch (e) {
    FF.toast(e.message, true); btn.disabled = false; btn.textContent = "PURCHASE NOW";
  }
}
boot();
</script>
</body>
</html>
