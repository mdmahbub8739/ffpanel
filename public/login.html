<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Login · PANELSELL</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="top"></div>
<main class="wrap" style="max-width:440px;margin-top:24px">
  <div class="card">
    <h2 style="justify-content:center;margin-bottom:18px">Welcome Back</h2>
    <div class="field"><label>Email</label><input class="input" id="email" type="email" autocomplete="email"></div>
    <div class="field"><label>Password</label><input class="input" id="password" type="password" autocomplete="current-password"></div>
    <button class="btn btn-green btn-block" style="margin-top:8px" id="go">LOG IN</button>
    <p class="muted" style="text-align:center;margin-top:14px">No account? <a href="register.html" style="color:var(--green);font-weight:700">Register</a></p>
  </div>
</main>
<script src="/js/app.js"></script>
<script>
document.getElementById("top").innerHTML = topBar();
FF.loadConfig();
async function go() {
  const btn = document.getElementById("go"); btn.disabled = true; btn.textContent = "...";
  try {
    await FF.api("/auth/login", { method: "POST", body: { email: email.value.trim(), password: password.value } });
    location.href = FF.param("next") || "account.html";
  } catch (e) { FF.toast(e.message, true); btn.disabled = false; btn.textContent = "LOG IN"; }
}
document.getElementById("go").onclick = go;
document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
</script>
</body>
</html>
