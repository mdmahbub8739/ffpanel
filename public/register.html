<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Register · PANELSELL</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="top"></div>
<main class="wrap" style="max-width:440px;margin-top:24px">
  <div class="card">
    <h2 style="justify-content:center;margin-bottom:18px">Create Account</h2>
    <div class="field"><label>Name</label><input class="input" id="name"></div>
    <div class="field"><label>Email</label><input class="input" id="email" type="email"></div>
    <div class="field"><label>Phone (optional)</label><input class="input" id="phone" type="tel"></div>
    <div class="field"><label>Password</label><input class="input" id="password" type="password"></div>
    <div class="field"><label>Referral Code (optional)</label><input class="input" id="ref"></div>
    <button class="btn btn-green btn-block" style="margin-top:8px" id="go">REGISTER</button>
    <p class="muted" style="text-align:center;margin-top:14px">Have an account? <a href="login.html" style="color:var(--green);font-weight:700">Log in</a></p>
  </div>
</main>
<script src="/js/app.js"></script>
<script>
document.getElementById("top").innerHTML = topBar();
FF.loadConfig();
const r = FF.param("ref"); if (r) document.getElementById("ref").value = r;
document.getElementById("go").onclick = async function () {
  const btn = this; btn.disabled = true; btn.textContent = "...";
  try {
    await FF.api("/auth/register", { method: "POST", body: {
      name: name.value.trim(), email: email.value.trim(), phone: phone.value.trim(),
      password: password.value, ref: ref.value.trim() } });
    location.href = "account.html";
  } catch (e) { FF.toast(e.message, true); btn.disabled = false; btn.textContent = "REGISTER"; }
};
</script>
</body>
</html>
